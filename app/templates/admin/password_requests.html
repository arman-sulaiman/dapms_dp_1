{% extends 'layout.html' %}
{% block content %}
<div class="bg-white rounded-2xl shadow p-6">
  <h2 class="text-2xl font-bold mb-4">Password Reset Requests</h2>
  <div class="space-y-3">{% for r in rows %}<div class="border rounded-xl p-4 flex justify-between gap-4"><div><div class="font-semibold">{{ r['user_email'] }}</div><div class="text-sm text-slate-500">{{ r['created_at'] }} · {{ r['status'] }}</div><div class="text-sm mt-2">{{ r['note'] }}</div></div><form method="post"><input type="hidden" name="request_id" value="{{ r['id'] }}"><button class="bg-slate-900 text-white px-4 py-2 rounded-xl text-sm">Mark Done</button></form></div>{% else %}<div class="text-slate-500">No requests.</div>{% endfor %}</div>
</div>
{% endblock %}
