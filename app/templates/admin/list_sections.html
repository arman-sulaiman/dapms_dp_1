{% extends 'layout.html' %}
{% block content %}
<div class="bg-white rounded-2xl shadow p-6">
<h2 class="text-2xl font-bold mb-4">Sections</h2>
<div class="overflow-auto"><table class="w-full text-sm"><tr class="border-b"><th class="text-left py-2">Course</th><th class="text-left">Section</th><th class="text-left">Teacher</th><th class="text-left">Term</th><th class="text-left">Term Status</th></tr>{% for r in rows %}<tr class="border-b"><td class="py-2">{{ r['course_code'] }} - {{ r['title'] }}</td><td>{{ r['section_no'] }}</td><td>{{ r['teacher_name'] }}</td><td>{{ r['term_name'] }}</td><td><span class="px-2 py-1 rounded-full text-xs {% if r['term_status']=='running' %}bg-emerald-100 text-emerald-700{% elif r['term_status']=='upcoming' %}bg-amber-100 text-amber-700{% else %}bg-slate-100 text-slate-700{% endif %}">{{ r['term_status'] }}</span></td></tr>{% endfor %}</table></div>
</div>
{% endblock %}
