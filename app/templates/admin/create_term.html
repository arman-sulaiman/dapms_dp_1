{% extends 'layout.html' %}
{% block content %}
<div class="max-w-2xl bg-white rounded-2xl shadow p-6">
  <h2 class="text-2xl font-bold mb-2">Create Term</h2>
  <p class="text-slate-500 mb-6">Create a term by semester and year. Setting it to running will automatically close the
    previous running term.</p>
  <form method="post" class="space-y-4">
    <div class="grid md:grid-cols-2 gap-4">
      <select name="semester" class="w-full border rounded-xl px-4 py-3" required>
        {% for semester in semesters %}<option value="{{ semester }}">{{ semester }}</option>{% endfor %}
      </select>
      <input name="year" type="number" min="2020" max="2100" placeholder="Year"
        class="w-full border rounded-xl px-4 py-3" required>
    </div>
    <div class="grid md:grid-cols-2 gap-4">
      <input name="start_date" type="date" class="w-full border rounded-xl px-4 py-3" required>
      <input name="end_date" type="date" class="w-full border rounded-xl px-4 py-3" required>
    </div>
    <select name="status" class="w-full border rounded-xl px-4 py-3">
      <option value="running">Running</option>
      <option value="upcoming">Upcoming</option>
      <option value="completed">Completed</option>
    </select>
    <button class="bg-slate-900 text-white px-5 py-3 rounded-xl">Save</button>
  </form>
</div>
{% endblock %}
