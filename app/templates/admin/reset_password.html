{% extends 'layout.html' %}
{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-2xl shadow p-8 space-y-4">
  <h2 class="text-2xl font-bold">Reset Password</h2>
  <div class="text-slate-600">{{ profile['name'] }} · {{ profile['email'] }}</div>
  <form method="post" class="space-y-4">
    <input name="new_password" placeholder="New password" class="w-full border rounded-xl px-4 py-3" required>
    <button class="bg-slate-900 text-white px-5 py-3 rounded-xl">Reset Password</button>
  </form>
</div>
{% endblock %}
