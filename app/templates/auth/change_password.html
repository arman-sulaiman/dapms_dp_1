{% extends 'layout.html' %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-2xl shadow p-8">
  <h2 class="text-2xl font-bold mb-6">Change Password</h2>
  <form method="post" class="space-y-4">
    <input name="current_password" type="password" placeholder="Current password" class="w-full border rounded-xl px-4 py-3" required>
    <input name="new_password" type="password" placeholder="New password" class="w-full border rounded-xl px-4 py-3" required>
    <input name="confirm_password" type="password" placeholder="Confirm password" class="w-full border rounded-xl px-4 py-3" required>
    <button class="bg-slate-900 text-white px-5 py-3 rounded-xl">Update Password</button>
  </form>
</div>
{% endblock %}
