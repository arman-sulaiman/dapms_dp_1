{% extends 'layout.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow p-8">
  <h2 class="text-3xl font-bold mb-6">Login</h2>
  <form method="post" class="space-y-4">
    <input name="email" type="email" placeholder="Email" class="w-full border rounded-xl px-4 py-3" required>
    <input name="password" type="password" placeholder="Password" class="w-full border rounded-xl px-4 py-3" required>
    <button class="w-full bg-slate-900 text-white px-4 py-3 rounded-xl">Login</button>
  </form>
  <a class="block mt-4 text-sky-700 text-sm" href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
</div>
{% endblock %}
