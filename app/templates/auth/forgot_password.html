{% extends 'layout.html' %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-2xl shadow p-8">
  <h2 class="text-2xl font-bold mb-4">Forgot Password</h2>
  <p class="text-slate-500 mb-6">Submit your email and a note. Admin can review and reset your password.</p>
  <form method="post" class="space-y-4">
    <input name="email" type="email" placeholder="Your email" class="w-full border rounded-xl px-4 py-3" required>
    <textarea name="note" placeholder="Optional note" class="w-full border rounded-xl px-4 py-3 h-28"></textarea>
    <button class="bg-slate-900 text-white px-5 py-3 rounded-xl">Send Request</button>
  </form>
</div>
{% endblock %}
