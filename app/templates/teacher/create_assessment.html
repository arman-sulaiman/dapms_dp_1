{% extends 'layout.html' %}
{% block content %}
<div class="max-w-3xl bg-white rounded-2xl shadow p-6">
  <h2 class="text-2xl font-bold mb-2">Create Assessment</h2>
  <p class="text-slate-500 mb-6">Set due date, decide whether students can submit online, and choose whether a file is required.</p>
  <form method="post" class="space-y-4">
    <div class="grid md:grid-cols-2 gap-4">
      <input name="title" placeholder="Assessment Title" class="w-full border rounded-xl px-4 py-3" required>
      <select name="type" class="w-full border rounded-xl px-4 py-3" required>
        <option>Assignment</option>
        <option>Quiz</option>
        <option>Mid</option>
        <option>Final</option>
        <option>Presentation</option>
        <option>Lab</option>
      </select>
    </div>
    <textarea name="description" placeholder="Short instruction or description" class="w-full border rounded-xl px-4 py-3 h-28"></textarea>
    <div class="grid md:grid-cols-3 gap-4">
      <input name="percentage" type="number" step="0.01" placeholder="Percentage" class="w-full border rounded-xl px-4 py-3" required>
      <input name="total_marks" type="number" step="0.01" placeholder="Total Marks" class="w-full border rounded-xl px-4 py-3" required>
      <input name="due_date" type="date" class="w-full border rounded-xl px-4 py-3">
    </div>
    <label class="flex items-center gap-3 border rounded-xl px-4 py-3"><input type="checkbox" name="allow_submission"> <span>Allow online submission from student panel</span></label>
    <label class="flex items-center gap-3 border rounded-xl px-4 py-3"><input type="checkbox" name="require_file"> <span>Require file upload for submission</span></label>
    <button class="bg-slate-900 text-white px-5 py-3 rounded-xl">Save Assessment</button>
  </form>
</div>
{% endblock %}
