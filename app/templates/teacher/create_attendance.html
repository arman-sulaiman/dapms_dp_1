{% extends 'layout.html' %}
{% block content %}
<div class="max-w-5xl mx-auto space-y-6">

  <div class="bg-white rounded-2xl shadow p-6">
    <div class="flex items-center justify-between gap-4 flex-wrap">
      <div>
        <h2 class="text-2xl font-bold text-slate-800">Take Attendance</h2>
        <p class="text-slate-500 mt-1">Mark each student as Present or Absent.</p>
      </div>
      <div class="text-sm text-slate-500">
        Total Students: <span class="font-semibold text-slate-800">{{ students|length }}</span>
      </div>
    </div>
  </div>

  <form method="post" class="space-y-6">
    <div class="bg-white rounded-2xl shadow p-6">
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Class No</label>
          <input
            name="class_no"
            type="number"
            placeholder="Enter class number"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-sky-500"
            required
          >
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Class Date</label>
          <input
            name="class_date"
            type="date"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-sky-500"
            required
          >
        </div>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow p-6">
      <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
        <h3 class="text-xl font-bold text-slate-800">Student List</h3>
        <div class="flex gap-2">
          <button
            type="button"
            onclick="setAllAttendance('Present')"
            class="px-4 py-2 rounded-xl bg-emerald-600 text-white hover:bg-emerald-700"
          >
            Mark All Present
          </button>
          <button
            type="button"
            onclick="setAllAttendance('Absent')"
            class="px-4 py-2 rounded-xl bg-rose-600 text-white hover:bg-rose-700"
          >
            Mark All Absent
          </button>
        </div>
      </div>

      <div class="space-y-4">
        {% for s in students %}
        <div class="border border-slate-200 rounded-2xl p-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div>
            <div class="font-semibold text-slate-800 text-lg">{{ s.name }}</div>
            <div class="text-sm text-slate-500">Student ID: {{ s.student_id }}</div>
          </div>

          <div class="flex items-center gap-3">
            <input
              type="hidden"
              name="status_{{ s.enrollment_id }}"
              id="status_{{ s.enrollment_id }}"
              value="Present"
            >

            <div class="inline-flex rounded-xl overflow-hidden border border-slate-300">
              <button
                type="button"
                id="present_btn_{{ s.enrollment_id }}"
                data-enrollment-id="{{ s.enrollment_id }}"
                onclick="setAttendance(this.dataset.enrollmentId, 'Present')"
                class="attendance-btn px-5 py-2.5 bg-emerald-600 text-white font-medium transition"
              >
                Present
              </button>

              <button
                type="button"
                id="absent_btn_{{ s.enrollment_id }}"
                data-enrollment-id="{{ s.enrollment_id }}"
                onclick="setAttendance(this.dataset.enrollmentId, 'Absent')"
                class="attendance-btn px-5 py-2.5 bg-white text-slate-700 font-medium transition"
              >
                Absent
              </button>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>

    <div class="flex justify-end">
      <button class="bg-slate-900 text-white px-6 py-3 rounded-xl hover:bg-slate-800">
        Save Attendance
      </button>
    </div>
  </form>
</div>

<script>
  const studentIds = {{ students | map(attribute='enrollment_id') | list | tojson }};

  function setAttendance(enrollmentId, status) {
    const hiddenInput = document.getElementById(`status_${enrollmentId}`);
    const presentBtn = document.getElementById(`present_btn_${enrollmentId}`);
    const absentBtn = document.getElementById(`absent_btn_${enrollmentId}`);

    hiddenInput.value = status;

    if (status === 'Present') {
      presentBtn.className = 'attendance-btn px-5 py-2.5 bg-emerald-600 text-white font-medium transition';
      absentBtn.className = 'attendance-btn px-5 py-2.5 bg-white text-slate-700 font-medium transition';
    } else {
      presentBtn.className = 'attendance-btn px-5 py-2.5 bg-white text-slate-700 font-medium transition';
      absentBtn.className = 'attendance-btn px-5 py-2.5 bg-rose-600 text-white font-medium transition';
    }
  }

  function setAllAttendance(status) {
    studentIds.forEach(id => setAttendance(String(id), status));
  }
</script>
{% endblock %}
