{% extends 'layout.html' %}
{% block content %}
<div class="max-w-3xl mx-auto bg-white rounded-2xl shadow p-8">
  <h2 class="text-2xl font-bold mb-6">Edit Assignment</h2>
  <form method="post" enctype="multipart/form-data" class="space-y-4">
    <input name="title" value="{{ assignment.title }}" placeholder="Assignment title" class="w-full border rounded-xl px-4 py-3" required>
    <input name="topic" value="{{ assignment.topic }}" placeholder="Topic or heading" class="w-full border rounded-xl px-4 py-3">
    <textarea name="description" placeholder="Instructions" class="w-full border rounded-xl px-4 py-3 h-32">{{ assignment.description }}</textarea>
    <div class="grid md:grid-cols-2 gap-4">
      <input name="due_date" type="date" value="{{ assignment.due_date }}" class="w-full border rounded-xl px-4 py-3">
      <input name="total_marks" type="number" step="0.01" value="{{ assignment.total_marks }}" class="w-full border rounded-xl px-4 py-3" required>
    </div>
    <div class="space-y-2">
      <input type="file" name="file" class="text-sm">
      <label class="flex items-center gap-2"><input type="checkbox" name="require_file" {% if assignment.require_file == 1 %}checked{% endif %}> Require student file upload</label>
    </div>
    <button class="bg-slate-900 text-white px-5 py-3 rounded-xl">Save Changes</button>
  </form>
</div>
{% endblock %}
